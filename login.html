<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>OPticket - Login</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"><link rel="stylesheet" href="auth/css/auth.css"><link rel="stylesheet" href="assets/css/common-fix.css"></head><body><main class="auth-page"><header class="auth-top"><img src="auth/images/logo.png" class="logo"><div class="help"><div class="help-item"><i class="fa-solid fa-headset"></i><span>Need Help?</span></div><div class="divider"></div><div class="help-item"><i class="fa-solid fa-phone"></i><div class="phone-text"><b>1800-123-4567</b><small>We're here for you 24/7</small></div></div></div></header><section class="auth-wrap"><aside class="left-panel login-bg-only"><div class="left-content" aria-hidden="true"></div><div class="left-visual"></div></aside><section class="auth-card-wrap"><form class="auth-card login"><div class="form-head center"><div class="main-icon"><i class="fa-regular fa-user"></i></div><h2>Welcome Back!</h2><p>Login to your account to continue</p></div><div class="field"><label>Mobile Number / Email ID</label><div class="input-wrap"><i class="fa-solid fa-mobile-screen-button"></i><input placeholder="Enter mobile number or email"></div></div><div class="field"><label>Password</label><div class="input-wrap"><i class="fa-solid fa-lock"></i><input type="password" placeholder="Enter your password"><button type="button" class="eye toggle-password"><i class="fa-regular fa-eye-slash"></i></button></div></div><div class="forgot-link"><a href="auth/forgot-password.html">Forgot Password?</a></div><div class="row-between"><label class="check"><input type="checkbox" checked>Remember me</label></div><a class="btn btn-primary" href="patient-dashboard.html">Login</a><div class="or">OR</div><button type="button" class="btn btn-outline" data-toast="OTP login request sent"><i class="fa-solid fa-mobile-screen-button"></i>Login with OTP</button><p class="terms">By continuing, you agree to our<br><a class="text-link" href="#">Terms & Conditions</a> &nbsp; and &nbsp; <a class="text-link" href="#">Privacy Policy</a></p><p class="bottom-link">New here? <a href="auth/register.html">Create an account <i class="fa-solid fa-arrow-right"></i></a></p></form></section></section></main><script src="auth/js/auth.js"></script><script src="assets/js/ui-fixes.js"></script><script src="assets/js/common-fix.js"></script></body></html>
